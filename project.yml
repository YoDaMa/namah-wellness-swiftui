name: NamahWellness
options:
  bundleIdPrefix: com.namah
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: "V78DYGQTSW"

targets:
  NamahWellness:
    type: application
    platform: iOS
    sources:
      - NamahWellness
    resources:
      - NamahWellness/Resources
    info:
      path: NamahWellness/Resources/Info.plist
      properties:
        CFBundleDisplayName: Namah
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIAppFonts: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.namah.wellness
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
