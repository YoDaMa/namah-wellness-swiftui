name: NamahWellness
options:
  bundleIdPrefix: com.namah
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: "V78DYGQTSW"

targets:
  NamahWellness:
    type: application
    platform: iOS
    sources:
      - NamahWellness
    resources:
      - NamahWellness/Resources
    info:
      path: NamahWellness/Resources/Info.plist
      properties:
        CFBundleDisplayName: Namah
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - DMSerifDisplay-Regular.ttf
          - DMSerifDisplay-Italic.ttf
          - PlusJakartaSans-Variable.ttf
          - PlusJakartaSans-Italic-Variable.ttf
          - ETBookOT-Roman.otf
          - ETBookOT-Bold.otf
          - ETBookOT-Italic.otf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.namah.wellness
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 9

  NamahWellnessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NamahWellnessTests
    dependencies:
      - target: NamahWellness
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.namah.wellness.tests
        GENERATE_INFOPLIST_FILE: YES
