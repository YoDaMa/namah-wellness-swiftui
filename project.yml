name: NamahWellness
options:
  bundleIdPrefix: com.namah
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    INFOPLIST_FILE: NamahWellness/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""

targets:
  NamahWellness:
    type: application
    platform: iOS
    sources:
      - NamahWellness
    resources:
      - NamahWellness/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.namah.wellness
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: Namah
